  <style>
    .btn.btn-lg.btn-primary.small {
      max-height: 95%;
      font-size: 1rem;
    }

    div.filters {
      padding-left: 3rem;
      padding-top: 1rem;
      padding-bottom: 2rem;
      margin-left: 3rem;
      margin-right: 3rem;
      margin-bottom: 1.5rem;
      border-color: rgb(255, 255, 255);
      border-style: solid;
    }

    img.in-post {
      max-width: 10%;
      max-height: 10%;
    }

    img.in-comment {
      max-width: 5%;
      max-height: 5%;
    }

    img.in-profile {
      max-width: 25%;
      max-height: 25%;
      margin: auto;
    }

    img {
      display: block;
    }

    button.btn.btn-sm.btn-outline-secondary {
      --bs-btn-color: auto;
      margin-right: .125rem;
    }

    button.btn.btn-sm.btn-outline-secondary.like {
      --bs-btn-bg: green;
    }

    button.btn.btn-sm.btn-outline-secondary.dislike {
      --bs-btn-bg: red;
    }

    input:not(.checkbox),
    textarea {
      margin-bottom: 1rem;
    }

    div.bg-body-tertiary.p-5.rounded {
      margin-bottom: 1.5rem;
      margin-left: auto;
      margin-right: auto;
    }

    div.bg-body-tertiary.p-5.rounded.post {
      width: 75%;
    }

    div.bg-body-tertiary.p-5.rounded.comment,
    div.categories,
    div.post-types {
      margin-bottom: 1rem;
    }

    div.bg-body-tertiary.p-5.rounded.comment,
    div.bg-body-tertiary.p-5.rounded.new-comment {
      width: 55%;
    }

    div.bg-body-tertiary.p-5.rounded.error {
      text-align: center;
    }

    div.post-content {
      padding: 1rem;
    }

    div.comment-content {
      padding: .5rem;
    }

    label {
      font-weight: 500;
    }

    label.count {
      margin-right: .25rem;
    }

    label:not(.count) {
      font-size: 1.25rem;
      margin-bottom: .5rem;
    }

    fieldset {
      display: block;
      margin-bottom: 1rem;
      padding: 1rem;
      border: .25rem rgb(255, 255, 255) groove;
    }

    fieldset.post {
      min-height: 15rem;
      margin-top: 1rem;
      height: auto;
    }

    fieldset.comment {
      min-height: 10rem;
      margin-top: 1rem;
      height: auto;
    }

    .bd-placeholder-img {
      font-size: 1.125rem;
      text-anchor: middle;
      -webkit-user-select: none;
      -moz-user-select: none;
      user-select: none;
    }

    @media (min-width: 768px) {
      .bd-placeholder-img-lg {
        font-size: 3.5rem;
      }
    }

    .b-example-divider {
      width: 100%;
      height: 3rem;
      background-color: rgba(0, 0, 0, .1);
      border: solid rgba(0, 0, 0, .15);
      border-width: 1px 0;
      box-shadow: inset 0 .5em 1.5em rgba(0, 0, 0, .1), inset 0 .125em .5em rgba(0, 0, 0, .15);
    }

    .b-example-vr {
      flex-shrink: 0;
      width: 1.5rem;
      height: 100vh;
    }

    .bi {
      vertical-align: -.125em;
      fill: currentColor;
    }

    .nav-scroller {
      position: relative;
      z-index: 2;
      height: 2.75rem;
      overflow-y: hidden;
    }

    .nav-scroller .nav {
      display: flex;
      flex-wrap: nowrap;
      padding-bottom: 1rem;
      margin-top: -1px;
      overflow-x: auto;
      text-align: center;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
    }

    .btn-bd-primary {
      --bd-violet-bg: #712cf9;
      --bd-violet-rgb: 112.520718, 44.062154, 249.437846;

      --bs-btn-font-weight: 600;
      --bs-btn-color: var(--bs-white);
      --bs-btn-bg: var(--bd-violet-bg);
      --bs-btn-border-color: var(--bd-violet-bg);
      --bs-btn-hover-color: var(--bs-white);
      --bs-btn-hover-bg: #6528e0;
      --bs-btn-hover-border-color: #6528e0;
      --bs-btn-focus-shadow-rgb: var(--bd-violet-rgb);
      --bs-btn-active-color: var(--bs-btn-hover-color);
      --bs-btn-active-bg: #5a23c8;
      --bs-btn-active-border-color: #5a23c8;
    }

    .bd-mode-toggle {
      z-index: 1500;
    }

    .bd-mode-toggle .dropdown-menu .active .bi {
      display: block !important;
    }
  </style>

  <!-- Custom styles for this template -->
  <link href="/assets/navbar-static.css" rel="stylesheet">
</head>

  <div class="dropdown position-fixed bottom-0 end-0 mb-3 me-3 bd-mode-toggle">

      aria-expanded="false" data-bs-toggle="dropdown" aria-label="Toggle theme (auto)">
      <svg class="bi my-1 theme-icon-active" width="1em" height="1em">
        <use href="#circle-half"></use>
      </svg>

    </button>
    <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="bd-theme-text">
      <li>
        <button type="button" class="dropdown-item d-flex align-items-center" data-bs-theme-value="light"

          <svg class="bi me-2 opacity-50" width="1em" height="1em">
            <use href="#sun-fill"></use>
          </svg>
          Light
          <svg class="bi ms-auto d-none" width="1em" height="1em">
            <use href="#check2"></use>
          </svg>
        </button>
      </li>
      <li>
        <button type="button" class="dropdown-item d-flex align-items-center" data-bs-theme-value="dark"
          aria-pressed="false">
          <svg class="bi me-2 opacity-50" width="1em" height="1em">
            <use href="#moon-stars-fill"></use>
          </svg>
          Dark
          <svg class="bi ms-auto d-none" width="1em" height="1em">
            <use href="#check2"></use>
          </svg>
        </button>
      </li>
      <li>
        <button type="button" class="dropdown-item d-flex align-items-center active" data-bs-theme-value="auto"
          aria-pressed="true">
          <svg class="bi me-2 opacity-50" width="1em" height="1em">
            <use href="#circle-half"></use>
          </svg>
          Auto
          <svg class="bi ms-auto d-none" width="1em" height="1em">
            <use href="#check2"></use>
          </svg>
        </button>
      </li>
    </ul>
